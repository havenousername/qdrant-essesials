services: 
  qdrant_cluster:
    image: qdrant/qdrant:latest
    container_name: qdrant_node
    restart: unless-stopped
    init: true
    ports:
      - "6333:6333"
      - "6334:6334"
      - "6335:6335"
    volumes: 
      - qdrant_data:/qdrant/storage
    environment: 
      QDRANT__CLUSTER__ENABLED: "false"
      QDRANT__LOG_LEVEL: "INFO"
      QDRANT__TELEMETRY_DISABLED: "true"
    healthcheck: 
      test: ["CMD-SHELL", "wget -qO- http://127.0.0.1:6333/healthz || exit 1"]
      interval: 10s
      timeout: 1s
      retries: 5
      start_period: 10s
    ulimits:
      nofile:
        soft: 65536
        hard: 65536
    logging:
      driver: json-file 
      options: 
        max-size: "10m"
        max-file: "3"

volumes:
  qdrant_data: